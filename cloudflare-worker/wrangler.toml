name = "cookmushroom-rebuild-cron"
main = "rebuild-cron.js"
compatibility_date = "2024-01-01"

# Cron trigger: Every 12 hours at 00:00 and 12:00 UTC
[triggers]
crons = ["0 */12 * * *"]

# Environment variables (add PAGES_DEPLOY_HOOK as a secret)
# Don't put the actual URL here - add it via: wrangler secret put PAGES_DEPLOY_HOOK
