name: Scheduled Rebuild

on:
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab or API (triggered by Cloudflare Worker)

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Trigger Cloudflare Pages rebuild
        run: |
          echo "Triggering rebuild at $(date)"
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git commit --allow-empty -m "Scheduled rebuild - $(date +'%Y-%m-%d %H:%M UTC')"
          git push
