name: Scheduled Rebuild

on:
  schedule:
    # Rebuild every 6 hours (at 00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages rebuild
        run: |
          echo "Triggering rebuild at $(date)"
          # Empty commit to trigger Cloudflare Pages deployment
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Create empty commit and push
        run: |
          git commit --allow-empty -m "Scheduled rebuild - $(date +'%Y-%m-%d %H:%M UTC')"
          git push
