# ====================================================
# ROOT .HTACCESS FOR ASTRO + WORDPRESS HYBRID
# ====================================================
# Place this in: /public_html/.htaccess
# This handles routing for both Astro (root) and WordPress (admin)
# ====================================================

RewriteEngine On

# ====================================================
# 1. PRESERVE WORDPRESS APIs AND ASSETS
# ====================================================

# Allow WordPress REST API
RewriteRule ^wp-json(/.*)?$ admin/index.php [L,QSA]

# Allow GraphQL endpoint (if WPGraphQL is installed)
RewriteRule ^graphql/?$ admin/index.php [L,QSA]

# Allow WordPress media and assets
RewriteRule ^wp-content(/.*)?$ admin/wp-content$1 [L]
RewriteRule ^wp-includes(/.*)?$ admin/wp-includes$1 [L]

# ====================================================
# 2. WORDPRESS ADMIN ACCESS
# ====================================================

# WordPress admin panel
RewriteRule ^admin(/.*)?$ admin/$1 [L]
RewriteRule ^wp-admin(/.*)?$ admin/wp-admin$1 [L]
RewriteRule ^wp-login\.php$ admin/wp-login.php [L]

# ====================================================
# 3. ASTRO STATIC FILES (if using static build)
# ====================================================

# Serve static assets directly
RewriteCond %{REQUEST_FILENAME} -f
RewriteRule ^ - [L]

# ====================================================
# 4. ASTRO ROUTING (everything else)
# ====================================================

# If file doesn't exist, try Astro's index.html
RewriteCond %{REQUEST_FILENAME} !-f
RewriteCond %{REQUEST_FILENAME} !-d
RewriteRule ^(.*)$ /index.html [L]

# ====================================================
# PERFORMANCE & CACHING
# ====================================================

# Enable GZIP compression
<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript
</IfModule>

# Browser caching
<IfModule mod_expires.c>
    ExpiresActive On
    ExpiresByType image/jpg "access plus 1 year"
    ExpiresByType image/jpeg "access plus 1 year"
    ExpiresByType image/gif "access plus 1 year"
    ExpiresByType image/png "access plus 1 year"
    ExpiresByType image/webp "access plus 1 year"
    ExpiresByType image/svg+xml "access plus 1 year"
    ExpiresByType text/css "access plus 1 month"
    ExpiresByType application/javascript "access plus 1 month"
    ExpiresByType text/javascript "access plus 1 month"
</IfModule>

# ====================================================
# SECURITY
# ====================================================

# Disable directory browsing
Options -Indexes

# Protect sensitive files
<FilesMatch "^\.">
    order allow,deny
    deny from all
</FilesMatch>
