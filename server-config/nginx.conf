server {
    listen 80;
    server_name cookmushroom.com www.cookmushroom.com;
    root /var/www/cookmushroom;
    index index.html;

    # ====================================================
    # 1. WORDPRESS APIs AND ASSETS
    # ====================================================

    # WordPress REST API
    location ~ ^/wp-json(/.*)?$ {
        try_files $uri /admin/index.php?$args;
    }

    # GraphQL endpoint (if using WPGraphQL)
    location /graphql {
        try_files $uri /admin/index.php?$args;
    }

    # WordPress media and assets
    location ~ ^/wp-content(/.*)?$ {
        try_files /admin/wp-content$1 =404;
    }

    location ~ ^/wp-includes(/.*)?$ {
        try_files /admin/wp-includes$1 =404;
    }

    # ====================================================
    # 2. WORDPRESS ADMIN
    # ====================================================

    location /admin {
        index index.php;
        try_files $uri $uri/ /admin/index.php?$args;
    }

    location /wp-admin {
        rewrite ^/wp-admin(.*)$ /admin/wp-admin$1 permanent;
    }

    location /wp-login.php {
        rewrite ^/wp-login\.php$ /admin/wp-login.php permanent;
    }

    # PHP processing for WordPress
    location ~ ^/admin/.*\.php$ {
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock; # Adjust PHP version
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ====================================================
    # 3. BLOCK DIRECT WORDPRESS ACCESS (except APIs)
    # ====================================================

    # Redirect old WordPress URLs to Astro
    # This is optional - remove if you want to preserve old WP pages temporarily
    location ~ ^/(category|tag|author|page|[0-9]{4})/ {
        try_files $uri /index.html;
    }

    # ====================================================
    # 4. ASTRO STATIC SITE
    # ====================================================

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ====================================================
    # SECURITY
    # ====================================================

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }

    location ~ ^/admin/wp-config\.php {
        deny all;
    }

    # Disable XML-RPC
    location = /xmlrpc.php {
        deny all;
    }

    # ====================================================
    # CACHING & PERFORMANCE
    # ====================================================

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # GZIP compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;
}

# ====================================================
# SSL CONFIGURATION (recommended)
# ====================================================
# Run: certbot --nginx -d cookmushroom.com -d www.cookmushroom.com
