# ====================================================
# APACHE CONFIGURATION FOR WORDPRESS IN /admin
# ====================================================
# Place this in: /public_html/admin/.htaccess
# AFTER moving WordPress to the /admin subdirectory
# ====================================================

RewriteEngine On
RewriteBase /admin/

# Allow WordPress admin access
RewriteRule ^index\.php$ - [L]

# WordPress pretty permalinks
RewriteCond %{REQUEST_FILENAME} !-f
RewriteCond %{REQUEST_FILENAME} !-d
RewriteRule . /admin/index.php [L]

# ====================================================
# BLOCK PUBLIC WORDPRESS PAGES (keep APIs accessible)
# ====================================================
# Redirect all frontend WordPress URLs to admin
# But allow: /wp-json (REST API), /graphql, /wp-content (media)

RewriteCond %{REQUEST_URI} !^/admin
RewriteCond %{REQUEST_URI} !^/wp-json
RewriteCond %{REQUEST_URI} !^/graphql
RewriteCond %{REQUEST_URI} !^/wp-content
RewriteCond %{REQUEST_URI} !^/wp-includes
RewriteRule ^(.*)$ /admin/wp-admin/ [R=302,L]

# ====================================================
# SECURITY HARDENING
# ====================================================

# Disable directory browsing
Options -Indexes

# Block access to wp-config.php
<Files wp-config.php>
    order allow,deny
    deny from all
</Files>

# Disable XML-RPC (prevents brute force attacks)
<Files xmlrpc.php>
    order deny,allow
    deny from all
</Files>

# Block access to sensitive files
<FilesMatch "^(readme\.html|readme\.txt|license\.txt|wp-config-sample\.php)$">
    order allow,deny
    deny from all
</FilesMatch>
